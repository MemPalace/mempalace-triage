<div class="stat-glow" aria-hidden="true"></div>
<div class="relative flex flex-col h-full">
  <div class="eyebrow mb-5">{{ label() }}</div>
  <div class="mt-auto">
    <div class="stat-value tabular-nums">{{ value() ?? '—' }}</div>
    @if (subtitle(); as sub) {
      <div class="text-[12px] text-muted mt-2 leading-snug">{{ sub }}</div>
    }
  </div>
</div>
