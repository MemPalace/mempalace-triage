<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
  @for (col of columns(); track col.label) {
    <div class="queue" [attr.data-tone]="col.tone">
      <div class="queue-glow" aria-hidden="true"></div>
      <div class="relative">
        <header class="flex items-center gap-3 mb-5">
          <app-badge [label]="col.label" [tone]="col.tone" />
          <span class="eyebrow">{{ col.items.length }} item{{ col.items.length === 1 ? '' : 's' }}</span>
        </header>
        @if (col.items.length > 0) {
          <ul class="queue-list">
            @for (item of col.items; track item.number) {
              <li>
                <a
                  [href]="githubUrl(item)"
                  target="_blank"
                  rel="noopener"
                  class="queue-item-num"
                  >#{{ item.number }}</a
                >
                <span class="queue-item-title">{{ item.title }}</span>
                <div class="queue-item-author">&#64;{{ item.author }}</div>
              </li>
            }
          </ul>
        } @else {
          <p class="eyebrow text-dim">Empty</p>
        }
      </div>
    </div>
  }
</div>
